<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <title>ASGET</title>
    
    <!-- Import map (можно оставить, но лучше позже перенести зависимости в package.json) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1",
        "emoji-picker-react": "https://aistudiocdn.com/emoji-picker-react@^4.13.3",
        "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@2.39.3/dist/module/index.js"
      }
    }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Tailwind CSS (временное решение, позже лучше установить через npm) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    
    <!-- Стили проекта -->
    <style>
      /* Disable all browser-level scaling and gestures */
      :root {
        touch-action: pan-x pan-y;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }

      body {
        position: fixed;
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: none; /* Disable pull-to-refresh */
      }

      /* Modern, minimal scrollbar using a custom class */
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
        transition: scrollbar-color 0.3s ease-in-out;
      }

      .custom-scrollbar:hover {
         scrollbar-color: rgba(174, 186, 193, 0.125) transparent;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 1px;
        height: 1px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: transparent;
        border-radius: 3px;
        transition: background-color 0.3s ease-in-out;
      }

      .custom-scrollbar:hover::-webkit-scrollbar-thumb {
        background-color: rgba(174, 186, 193, 0.125);
      }

      .line-clamp-2 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      
      /* Custom scrollbar for Emoji Picker */
      aside.EmojiPickerReact .epr-body {
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
        transition: scrollbar-color 0.3s ease-in-out;
      }

      aside.EmojiPickerReact .epr-body:hover {
        scrollbar-color: rgba(174, 186, 193, 0.25) transparent;
      }

      aside.EmojiPickerReact .epr-body::-webkit-scrollbar {
        width: 2px;
        height: 2px;
      }

      aside.EmojiPickerReact .epr-body::-webkit-scrollbar-track {
        background: transparent;
      }

      aside.EmojiPickerReact .epr-body::-webkit-scrollbar-thumb {
        background-color: transparent;
        border-radius: 4px;
        transition: background-color 0.3s ease-in-out;
      }

      aside.EmojiPickerReact .epr-body:hover::-webkit-scrollbar-thumb {
        background-color: rgba(174, 186, 193, 0.25);
      }

      .bg-chat-pattern::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('https://asget.ru/img/pattern.svg');
        background-size: 200px;
        background-repeat: repeat;
        pointer-events: none;
        will-change: transform;
        opacity: 0.15;
      }
    </style>
    
    <!-- !!! УДАЛЕНО: <link rel="stylesheet" href="/index.css"> !!! -->
    <!-- Стили будут подключены автоматически через Vite -->
    
  </head>
  <body class="bg-gray-800">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- !!! УДАЛЕНО: <script type="module" src="/index.tsx"></script> !!! -->
    <!-- Vite сам вставит правильный скрипт в собранном index.html -->
    
    <!-- Скрипты для отключения жестов (можно оставить) -->
    <script>
      // Force disable pinch-to-zoom on iOS Safari
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      });

      // Disable double-tap zoom and multi-touch zoom on mobile
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      // Secondary check for double tap (some browsers)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </body>
</html>
