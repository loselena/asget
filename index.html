<style>
  /* Prevent zooming and overscroll behavior */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    /* touch-action: manipulation disables double-tap to zoom while keeping scrolling and pinch-zoom (pinch is handled by meta tag) */
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }

  /* Modern, minimal scrollbar using a custom class */
  .custom-scrollbar {
    /* For Firefox */
    scrollbar-width: thin; /* Sets to a thin scrollbar */
    scrollbar-color: transparent transparent; /* Thumb and track are transparent by default */
    transition: scrollbar-color 0.3s ease-in-out; /* Smooth transition for Firefox */
  }

  .custom-scrollbar:hover {
     /* On hover of the container, make the thumb visible for Firefox */
     scrollbar-color: rgba(174, 186, 193, 0.125) transparent;
  }

  /* For Webkit browsers (Chrome, Safari) */
  .custom-scrollbar::-webkit-scrollbar {
    width: 1px; /* Target width */
    height: 1px;
  }

  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent; /* Track is always transparent */
  }

  .custom-scrollbar::-webkit-scrollbar-thumb {
    background-color: transparent; /* Thumb is transparent by default */
    border-radius: 3px;
    transition: background-color 0.3s ease-in-out; /* Smooth fade in/out */
  }

  .custom-scrollbar:hover::-webkit-scrollbar-thumb {
    /* On hover of the container, make the thumb visible */
    background-color: rgba(174, 186, 193, 0.125);
  }

  .line-clamp-2 {
    overflow: hidden;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }
  
  /* Custom scrollbar for Emoji Picker */
  aside.EmojiPickerReact .epr-body {
    /* For Firefox */
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
    transition: scrollbar-color 0.3s ease-in-out;
  }

  aside.EmojiPickerReact .epr-body:hover {
    scrollbar-color: rgba(174, 186, 193, 0.25) transparent;
  }

  /* For Webkit browsers (Chrome, Safari) */
  aside.EmojiPickerReact .epr-body::-webkit-scrollbar {
    width: 2px;
    height: 2px;
  }

  aside.EmojiPickerReact .epr-body::-webkit-scrollbar-track {
    background: transparent;
  }

  aside.EmojiPickerReact .epr-body::-webkit-scrollbar-thumb {
    background-color: transparent;
    border-radius: 4px;
    transition: background-color 0.3s ease-in-out;
  }

  aside.EmojiPickerReact .epr-body:hover::-webkit-scrollbar-thumb {
    background-color: rgba(174, 186, 193, 0.25);
  }

  .bg-chat-pattern::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url('https://asget.ru/img/pattern.svg');
    background-size: 200px;
    background-repeat: repeat;
    pointer-events: none;
    will-change: transform;
    opacity: 0.15;
  }
</style>

</head>

  </body>
</html>
